package: android.hardware.security.authgraph
go_package: android/hardware/security/authgraph
interfaces:
    - name: IAuthGraphKeyExchange
      descriptor: android.hardware.security.authgraph.IAuthGraphKeyExchange
      methods:
        - name: create
          transaction_code_offset: 0
          return_type:
            name: SessionInitiationInfo
        - name: init
          transaction_code_offset: 1
          params:
            - name: peerPubKey
              type:
                name: PubKey
              direction: in
            - name: peerId
              type:
                name: Identity
              direction: in
            - name: peerNonce
              type:
                name: byte
                is_array: true
              direction: in
            - name: peerVersion
              type:
                name: int
              direction: in
          return_type:
            name: KeInitResult
        - name: finish
          transaction_code_offset: 2
          params:
            - name: peerPubKey
              type:
                name: PubKey
              direction: in
            - name: peerId
              type:
                name: Identity
              direction: in
            - name: peerSignature
              type:
                name: SessionIdSignature
              direction: in
            - name: peerNonce
              type:
                name: byte
                is_array: true
              direction: in
            - name: peerVersion
              type:
                name: int
              direction: in
            - name: ownKey
              type:
                name: Key
              direction: in
          return_type:
            name: SessionInfo
        - name: authenticationComplete
          transaction_code_offset: 3
          params:
            - name: peerSignature
              type:
                name: SessionIdSignature
              direction: in
            - name: sharedKeys
              type:
                name: Arc
                is_array: true
                fixed_size: "2"
              direction: in
          return_type:
            name: Arc
            is_array: true
            fixed_size: "2"
