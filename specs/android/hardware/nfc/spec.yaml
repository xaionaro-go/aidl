package: android.hardware.nfc
go_package: android/hardware/nfc
interfaces:
    - name: INfc
      descriptor: android.hardware.nfc.INfc
      methods:
        - name: open
          transaction_code_offset: 0
          params:
            - name: clientCallback
              type:
                name: INfcClientCallback
              direction: in
          return_type:
            name: void
        - name: close
          transaction_code_offset: 1
          params:
            - name: type
              type:
                name: NfcCloseType
              direction: in
          return_type:
            name: void
        - name: coreInitialized
          transaction_code_offset: 2
          return_type:
            name: void
        - name: factoryReset
          transaction_code_offset: 3
          return_type:
            name: void
        - name: getConfig
          transaction_code_offset: 4
          return_type:
            name: NfcConfig
        - name: powerCycle
          transaction_code_offset: 5
          return_type:
            name: void
        - name: preDiscover
          transaction_code_offset: 6
          return_type:
            name: void
        - name: write
          transaction_code_offset: 7
          params:
            - name: data
              type:
                name: byte
                is_array: true
              direction: in
          return_type:
            name: int
        - name: setEnableVerboseLogging
          transaction_code_offset: 8
          params:
            - name: enable
              type:
                name: boolean
              direction: in
          return_type:
            name: void
        - name: isVerboseLoggingEnabled
          transaction_code_offset: 9
          return_type:
            name: boolean
    - name: INfcClientCallback
      descriptor: android.hardware.nfc.INfcClientCallback
      methods:
        - name: sendData
          transaction_code_offset: 0
          params:
            - name: data
              type:
                name: byte
                is_array: true
              direction: in
          return_type:
            name: void
        - name: sendEvent
          transaction_code_offset: 1
          params:
            - name: event
              type:
                name: NfcEvent
              direction: in
            - name: status
              type:
                name: NfcStatus
              direction: in
          return_type:
            name: void
