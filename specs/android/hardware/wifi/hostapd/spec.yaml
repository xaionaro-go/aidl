            name: boolean
        - name: acsShouldExcludeDfs
          type:
            name: boolean
        - name: channel
          type:
            name: int
      annotations:
        - VintfStability
    - name: ClientInfo
      fields:
        - name: ifaceName
          type:
            name: String
        - name: apIfaceInstance
          type:
            name: String
        - name: clientAddress
          type:
            name: byte
            is_array: true
        - name: isConnected
          type:
            name: boolean
      annotations:
        - VintfStability
    - name: FrequencyRange
      fields:
        - name: startMhz
          type:
            name: int
        - name: endMhz
          type:
            name: int
      annotations:
