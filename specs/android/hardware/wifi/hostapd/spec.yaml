package: android.hardware.wifi.hostapd
go_package: android/hardware/wifi/hostapd
interfaces:
    - name: IHostapd
      descriptor: android.hardware.wifi.hostapd.IHostapd
      methods:
        - name: addAccessPoint
          transaction_code_offset: 0
          params:
            - name: ifaceParams
              type:
                name: IfaceParams
              direction: in
            - name: nwParams
              type:
                name: NetworkParams
              direction: in
          return_type:
            name: void
        - name: forceClientDisconnect
          transaction_code_offset: 1
          params:
            - name: ifaceName
              type:
                name: String
              direction: in
            - name: clientAddress
              type:
                name: byte
                is_array: true
              direction: in
            - name: reasonCode
              type:
                name: Ieee80211ReasonCode
              direction: in
          return_type:
            name: void
        - name: registerCallback
          transaction_code_offset: 2
          params:
            - name: callback
              type:
                name: IHostapdCallback
              direction: in
          return_type:
            name: void
        - name: removeAccessPoint
          transaction_code_offset: 3
          params:
            - name: ifaceName
              type:
                name: String
              direction: in
          return_type:
            name: void
        - name: setDebugParams
          transaction_code_offset: 4
          params:
            - name: level
              type:
                name: DebugLevel
              direction: in
          return_type:
            name: void
        - name: terminate
          transaction_code_offset: 5
          oneway: true
          return_type:
            name: void
    - name: IHostapdCallback
      descriptor: android.hardware.wifi.hostapd.IHostapdCallback
      methods:
        - name: onApInstanceInfoChanged
          transaction_code_offset: 0
          oneway: true
          params:
            - name: apInfo
              type:
                name: ApInfo
              direction: in
          return_type:
            name: void
        - name: onConnectedClientsChanged
          transaction_code_offset: 1
          oneway: true
          params:
            - name: clientInfo
              type:
                name: ClientInfo
              direction: in
          return_type:
            name: void
        - name: onFailure
          transaction_code_offset: 2
          oneway: true
          params:
            - name: ifaceName
              type:
                name: String
              direction: in
            - name: instanceName
              type:
                name: String
              direction: in
          return_type:
            name: void
parcelables:
    - name: ApInfo
      fields:
        - name: ifaceName
          type:
            name: String
        - name: apIfaceInstance
          type:
            name: String
        - name: freqMhz
          type:
            name: int
        - name: channelBandwidth
          type:
            name: ChannelBandwidth
        - name: generation
          type:
            name: Generation
        - name: apIfaceInstanceMacAddress
          type:
            name: byte
            is_array: true
        - name: vendorData
          type:
            name: OuiKeyedData
            is_array: true
          annotations:
            - nullable
      annotations:
