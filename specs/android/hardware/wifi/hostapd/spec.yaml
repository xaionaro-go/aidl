            name: boolean
        - name: enable80211AC
          type:
            name: boolean
        - name: enable80211AX
          type:
            name: boolean
        - name: enable6GhzBand
          type:
            name: boolean
        - name: enableHeSingleUserBeamformer
          type:
            name: boolean
        - name: enableHeSingleUserBeamformee
          type:
            name: boolean
        - name: enableHeMultiUserBeamformer
          type:
            name: boolean
        - name: enableHeTargetWakeTime
          type:
            name: boolean
        - name: enableEdmg
          type:
            name: boolean
        - name: enable80211BE
          type:
            name: boolean
        - name: maximumChannelBandwidth
          type:
            name: ChannelBandwidth
      annotations:
        - VintfStability
    - name: IfaceParams
      fields:
        - name: name
          type:
            name: String
        - name: hwModeParams
          type:
            name: HwModeParams
        - name: channelParams
          type:
            name: ChannelParams
            is_array: true
        - name: vendorData
          type:
            name: OuiKeyedData
            is_array: true
          annotations:
