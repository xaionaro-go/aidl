              type:
                name: ParceledListSlice
              direction: in
          return_type:
            name: void
        - name: onPrintersRemoved
          transaction_code_offset: 9
          params:
            - name: printerIds
              type:
                name: ParceledListSlice
              direction: in
          return_type:
            name: void
        - name: onCustomPrinterIconLoaded
          transaction_code_offset: 10
          params:
            - name: printerId
              type:
                name: PrinterId
              direction: in
