          transaction_code_offset: 8
          params:
            - name: printerId
              type:
                name: PrinterId
              direction: in
          return_type:
            name: void
        - name: stopPrinterStateTracking
          transaction_code_offset: 9
          params:
            - name: printerId
              type:
                name: PrinterId
              direction: in
          return_type:
            name: void
        - name: destroyPrinterDiscoverySession
          transaction_code_offset: 10
          return_type:
            name: void
    - name: IPrintServiceClient
      descriptor: android.printservice.IPrintServiceClient
      methods:
        - name: getPrintJobInfos
          transaction_code_offset: 0
          return_type:
            name: List
            type_args:
                - name: PrintJobInfo
        - name: getPrintJobInfo
          transaction_code_offset: 1
          params:
            - name: printJobId
              type:
                name: PrintJobId
              direction: in
