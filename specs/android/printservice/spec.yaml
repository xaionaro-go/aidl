            name: PrintJobInfo
        - name: setPrintJobState
          transaction_code_offset: 2
          params:
            - name: printJobId
              type:
                name: PrintJobId
              direction: in
            - name: state
              type:
                name: int
            - name: error
              type:
                name: String
          return_type:
            name: boolean
        - name: setPrintJobTag
          transaction_code_offset: 3
          params:
            - name: printJobId
              type:
                name: PrintJobId
              direction: in
            - name: tag
              type:
                name: String
          return_type:
            name: boolean
        - name: writePrintJobData
          transaction_code_offset: 4
          oneway: true
          params:
            - name: fd
              type:
                name: ParcelFileDescriptor
              direction: in
            - name: printJobId
              type:
                name: PrintJobId
              direction: in
          return_type:
            name: void
        - name: setProgress
          transaction_code_offset: 5
          params:
            - name: printJobId
              type:
                name: PrintJobId
              direction: in
            - name: progress
              type:
                name: float
              direction: in
          return_type:
            name: void
        - name: setStatus
          transaction_code_offset: 6
          params:
            - name: printJobId
              type:
                name: PrintJobId
              direction: in
            - name: status
              type:
                name: CharSequence
              direction: in
          return_type:
            name: void
        - name: setStatusRes
          transaction_code_offset: 7
          params:
            - name: printJobId
              type:
                name: PrintJobId
              direction: in
            - name: status
              type:
                name: int
            - name: appPackageName
              type:
                name: CharSequence
              direction: in
          return_type:
            name: void
        - name: onPrintersAdded
          transaction_code_offset: 8
          params:
