package: android.printservice
go_package: android/printservice
interfaces:
    - name: IPrintService
      descriptor: android.printservice.IPrintService
      oneway: true
      methods:
        - name: setClient
          transaction_code_offset: 0
          params:
            - name: client
              type:
                name: IPrintServiceClient
          return_type:
            name: void
        - name: requestCancelPrintJob
          transaction_code_offset: 1
          params:
            - name: printJobInfo
              type:
                name: PrintJobInfo
              direction: in
          return_type:
            name: void
        - name: onPrintJobQueued
          transaction_code_offset: 2
          params:
            - name: printJobInfo
              type:
                name: PrintJobInfo
              direction: in
          return_type:
            name: void
        - name: createPrinterDiscoverySession
          transaction_code_offset: 3
          return_type:
            name: void
        - name: startPrinterDiscovery
          transaction_code_offset: 4
          params:
            - name: priorityList
              type:
                name: List
                type_args:
                    - name: PrinterId
              direction: in
          return_type:
            name: void
        - name: stopPrinterDiscovery
          transaction_code_offset: 5
          return_type:
            name: void
        - name: validatePrinters
          transaction_code_offset: 6
          params:
            - name: printerIds
              type:
                name: List
                type_args:
                    - name: PrinterId
              direction: in
