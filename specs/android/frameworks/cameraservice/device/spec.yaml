package: android.frameworks.cameraservice.device
go_package: android/frameworks/cameraservice/device
interfaces:
    - name: ICameraDeviceCallback
      descriptor: android.frameworks.cameraservice.device.ICameraDeviceCallback
      oneway: true
      methods:
        - name: onCaptureStarted
          transaction_code_offset: 0
          params:
            - name: resultExtras
              type:
                name: CaptureResultExtras
              direction: in
            - name: timestamp
              type:
                name: long
              direction: in
          return_type:
            name: void
        - name: onDeviceError
          transaction_code_offset: 1
          params:
            - name: errorCode
              type:
                name: ErrorCode
              direction: in
            - name: resultExtras
              type:
                name: CaptureResultExtras
              direction: in
          return_type:
            name: void
        - name: onDeviceIdle
          transaction_code_offset: 2
          return_type:
            name: void
        - name: onPrepared
          transaction_code_offset: 3
          params:
            - name: streamId
              type:
                name: int
              direction: in
          return_type:
            name: void
        - name: onRepeatingRequestError
          transaction_code_offset: 4
          params:
            - name: lastFrameNumber
              type:
                name: long
              direction: in
            - name: repeatingRequestId
              type:
                name: int
              direction: in
          return_type:
            name: void
        - name: onResultReceived
          transaction_code_offset: 5
          params:
            - name: result
              type:
                name: CaptureMetadataInfo
              direction: in
            - name: resultExtras
              type:
                name: CaptureResultExtras
              direction: in
            - name: physicalCaptureResultInfos
              type:
                name: PhysicalCaptureResultInfo
                is_array: true
              direction: in
          return_type:
            name: void
    - name: ICameraDeviceUser
      descriptor: android.frameworks.cameraservice.device.ICameraDeviceUser
      methods:
        - name: beginConfigure
          transaction_code_offset: 0
          return_type:
            name: void
        - name: cancelRepeatingRequest
          transaction_code_offset: 1
          return_type:
            name: long
        - name: createDefaultRequest
          transaction_code_offset: 2
          params:
            - name: templateId
              type:
                name: TemplateId
              direction: in
          return_type:
            name: CameraMetadata
        - name: createStream
          transaction_code_offset: 3
          params:
            - name: outputConfiguration
              type:
                name: OutputConfiguration
              direction: in
          return_type:
            name: int
        - name: deleteStream
          transaction_code_offset: 4
          params:
            - name: streamId
              type:
                name: int
              direction: in
          return_type:
            name: void
        - name: disconnect
          transaction_code_offset: 5
          return_type:
            name: void
        - name: endConfigure
          transaction_code_offset: 6
          params:
            - name: operatingMode
              type:
                name: StreamConfigurationMode
              direction: in
            - name: sessionParams
              type:
                name: CameraMetadata
              direction: in
            - name: startTimeNs
              type:
                name: long
              direction: in
          return_type:
            name: void
        - name: flush
          transaction_code_offset: 7
          return_type:
            name: long
        - name: getCaptureRequestMetadataQueue
          transaction_code_offset: 8
          return_type:
            name: MQDescriptor
            type_args:
                - name: byte
                - name: SynchronizedReadWrite
        - name: getCaptureResultMetadataQueue
          transaction_code_offset: 9
          return_type:
            name: MQDescriptor
            type_args:
                - name: byte
                - name: SynchronizedReadWrite
        - name: isSessionConfigurationSupported
          transaction_code_offset: 10
          params:
            - name: sessionConfiguration
              type:
                name: SessionConfiguration
              direction: in
          return_type:
            name: boolean
        - name: prepare
          transaction_code_offset: 11
          params:
            - name: streamId
              type:
                name: int
              direction: in
          return_type:
            name: void
        - name: submitRequestList
          transaction_code_offset: 12
          params:
            - name: requestList
              type:
                name: CaptureRequest
                is_array: true
              direction: in
            - name: isRepeating
              type:
                name: boolean
              direction: in
          return_type:
            name: SubmitInfo
        - name: updateOutputConfiguration
          transaction_code_offset: 13
          params:
            - name: streamId
              type:
                name: int
              direction: in
            - name: outputConfiguration
              type:
                name: OutputConfiguration
              direction: in
          return_type:
            name: void
        - name: waitUntilIdle
          transaction_code_offset: 14
          return_type:
            name: void
