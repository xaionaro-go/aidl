package: android.frameworks.cameraservice.common
go_package: android/frameworks/cameraservice/common
parcelables:
    - name: ProviderIdAndVendorTagSections
      fields:
        - name: providerId
          type:
            name: long
        - name: vendorTagSections
          type:
            name: VendorTagSection
            is_array: true
      annotations:
        - VintfStability
    - name: VendorTag
      fields:
        - name: tagId
          type:
            name: long
        - name: tagName
          type:
            name: String
        - name: tagType
          type:
            name: CameraMetadataType
      annotations:
        - VintfStability
    - name: VendorTagSection
      fields:
        - name: sectionName
          type:
            name: String
        - name: tags
          type:
            name: VendorTag
            is_array: true
      annotations:
        - VintfStability
enums:
    - name: CameraMetadataType
      backing_type: int
      values:
        - name: BYTE
          value: "0"
        - name: INT32
          value: "1"
        - name: FLOAT
          value: "2"
        - name: INT64
          value: "3"
        - name: DOUBLE
          value: "4"
        - name: RATIONAL
          value: "5"
      annotations:
        - VintfStability
        - Backing
    - name: Status
      backing_type: int
      values:
        - name: NO_ERROR
          value: "0"
        - name: PERMISSION_DENIED
          value: "1"
        - name: ALREADY_EXISTS
          value: "2"
        - name: ILLEGAL_ARGUMENT
          value: "3"
        - name: DISCONNECTED
          value: "4"
        - name: TIMED_OUT
          value: "5"
        - name: DISABLED
          value: "6"
        - name: CAMERA_IN_USE
          value: "7"
        - name: MAX_CAMERAS_IN_USE
          value: "8"
        - name: DEPRECATED_HAL
          value: "9"
        - name: INVALID_OPERATION
          value: "10"
        - name: UNKNOWN_ERROR
          value: "11"
      annotations:
        - VintfStability
        - Backing
    - name: TagBoundaryId
      backing_type: long
      values:
        - name: AOSP
          value: "0x0"
        - name: VENDOR
          value: 0x80000000L
      annotations:
        - VintfStability
        - Backing
