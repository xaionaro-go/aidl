package: android.service.chooser
go_package: android/service/chooser
interfaces:
    - name: IChooserTargetResult
      descriptor: android.service.chooser.IChooserTargetResult
      oneway: true
      methods:
        - name: sendResult
          transaction_code_offset: 0
          params:
            - name: targets
              type:
                name: List
                type_args:
                    - name: ChooserTarget
              direction: in
          return_type:
            name: void
    - name: IChooserTargetService
      descriptor: android.service.chooser.IChooserTargetService
      oneway: true
      methods:
        - name: getChooserTargets
          transaction_code_offset: 0
          params:
            - name: targetComponentName
              type:
                name: ComponentName
              direction: in
            - name: matchedFilter
              type:
                name: IntentFilter
              direction: in
            - name: result
              type:
                name: IChooserTargetResult
          return_type:
            name: void
parcelables:
    - name: ChooserTarget
      java_wire_format:
        - name: Title
          write_method: opaque
        - name: "1"
          write_method: int32
          condition: mIcon!=null
        - name: Dest
          write_method: opaque
          condition: mIcon!=null
        - name: Score
          write_method: float32
        - name: ComponentName
          write_method: opaque
        - name: IntentExtras
          write_method: bundle
