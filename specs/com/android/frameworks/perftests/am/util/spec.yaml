              type:
                name: int
            - name: seq
              type:
                name: int
            - name: sourcePackage
              type:
                name: String
            - name: targetPackage
              type:
                name: String
            - name: flags
              type:
                name: int
            - name: bundle
              type:
                name: Bundle
              direction: in
          return_type:
            name: void
