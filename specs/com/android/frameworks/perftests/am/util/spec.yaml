      descriptor: com.android.frameworks.perftests.am.util.ITimeReceiverCallback
      methods:
        - name: sendTime
          transaction_code_offset: 0
          params:
            - name: type
              type:
                name: String
            - name: timeNs
              type:
                name: long
          return_type:
            name: void
