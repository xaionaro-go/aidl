package: android.hardware.face
type: FaceAuthenticateOptions
fields:
    - name: Flg
      type: int32
    - name: UserId
      type: int32
    - name: SensorId
      type: int32
    - name: DisplayState
      type: int32
    - name: AuthenticateReason
      type: int32
    - name: WakeReason
      type: int32
    - name: OpPackageName
      type: string16
    - name: AttributionTag
      type: string16
      condition: mAttributionTag!=null
