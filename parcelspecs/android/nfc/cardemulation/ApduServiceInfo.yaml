      type: int32
    - name: NewArrayList<AidGroup>(mDynamicAidGroups.values())
      type: opaque
      condition: mDynamicAidGroups.size()>0
    - name: RequiresDeviceUnlock?1:0
      type: int32
    - name: RequiresDeviceScreenOn?1:0
      type: int32
    - name: BannerResourceId
      type: int32
    - name: Uid
      type: int32
    - name: SettingsActivityName
      type: string16
    - name: CategoryOtherServiceEnabled?1:0
      type: int32
    - name: AutoTransact.size()
      type: int32
