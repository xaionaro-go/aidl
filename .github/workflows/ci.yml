name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.x']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Unit tests
        run: make test

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Verify generated code is up to date
        run: make check-generated

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build release binaries
        run: make release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            builds/bindercli-linux-arm64
            builds/bindercli-linux-amd64
          generate_release_notes: true
