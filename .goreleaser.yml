# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

builds:
  # All source files have //go:build linux — binder requires /dev/binder.
  # Remote mode still needs linux (gadb proxy links linux-only packages).
  - id: binder-mcp
    main: ./cmd/binder-mcp/
    binary: binder-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: bindercli
    main: ./cmd/bindercli/
    binary: bindercli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    # bindercli pulls in 923 packages (~1.2M lines of generated code).
    # Compiling packages in parallel exhausts the 7GB GitHub runner RAM
    # during cross-compilation. Limit to 1 concurrent package compilation.
    flags:
      - -p
      - '1'
    ldflags:
      - -s -w

  - id: binder-proxyd
    main: ./cmd/binder-proxyd/
    binary: binder-proxyd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: binder-mcp
    builds: [binder-mcp]
    formats:
      - binary
    name_template: "binder-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: bindercli
    builds: [bindercli]
    formats:
      - binary
    name_template: "bindercli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: binder-proxyd
    builds: [binder-proxyd]
    formats:
      - binary
    name_template: "binder-proxyd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: AndroidGoLab
    name: binder
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
